<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0a0a0a" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>Tap Tumble</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --border: rgba(255,255,255,0.07);
      --accent: #e8ff47;
      --text-primary: #f0f0f0;
      --text-muted: rgba(240,240,240,0.35);
    }

    html, body {
      min-height: 100%;
      background: var(--bg);
      color: var(--text-primary);
      font-family: 'DM Sans', sans-serif;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      opacity: 0.35; pointer-events: none; z-index: 0;
    }

    .page {
      position: relative; z-index: 1;
      min-height: 100dvh;
      display: flex; flex-direction: column; align-items: center;
      padding: 0 16px;
    }

    /* ── Header ── */
    header {
      width: 100%; max-width: 520px;
      padding: 28px 0 20px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid var(--border);
      animation: fadeDown 0.6s ease both;
    }

    .logo-zone { display: flex; align-items: center; gap: 12px; }

    .logo-slot {
      width: 40px; height: 40px;
      border-radius: 8px;
      border: 1px dashed rgba(255,255,255,0.18);
      background: #161616;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden; flex-shrink: 0;
    }
    /* Once you have a logo: <img src="logo.png" style="width:100%;height:100%;object-fit:contain"> */
    .logo-slot svg { width: 18px; height: 18px; opacity: 0.2; }

    .brand { display: flex; flex-direction: column; gap: 2px; }
    .brand-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px; letter-spacing: 0.06em; line-height: 1;
    }
    .brand-sub {
      font-family: 'DM Mono', monospace;
      font-size: 9px; letter-spacing: 0.14em;
      text-transform: uppercase; color: var(--accent);
    }

    .play-pill {
      font-family: 'DM Mono', monospace;
      font-size: 9px; letter-spacing: 0.1em;
      border: 1px solid var(--border);
      padding: 5px 12px; border-radius: 100px;
      color: var(--text-muted);
    }

    /* ── Game section ── */
    main {
      width: 100%; max-width: 520px;
      flex: 1;
      display: flex; flex-direction: column; align-items: center;
      padding: 28px 0 24px; gap: 10px;
      animation: fadeUp 0.7s 0.1s ease both;
    }

    .section-label {
      align-self: flex-start;
      font-family: 'DM Mono', monospace;
      font-size: 9px; font-weight: 400;
      letter-spacing: 0.16em; text-transform: uppercase;
      color: var(--text-muted);
    }

    /* Wrapper that gives the Breshna block a clean frame */
    .game-frame {
      width: 100%;
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid rgba(123, 63, 213, 0.3);
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.03),
        0 40px 80px rgba(0,0,0,0.7),
        0 0 60px rgba(123,63,213,0.07);
      position: relative;
    }

    .game-frame::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, #7b3fd5, var(--accent) 60%, transparent);
      z-index: 10; opacity: 0.85;
    }

    /* ── Breshna embed (untouched original) ── */
    /* The div below is exactly what Breshna gave you, just inside our frame */
    .breshna-embed {
      display: block;
      width: 100%;
    }

    /* Make the iframe fill the container responsively */
    .breshna-embed iframe {
      width: 100% !important;
      display: block;
    }

    /* ── Developer footer ── */
    footer {
      width: 100%; max-width: 520px;
      padding: 20px 0 40px;
      border-top: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between; gap: 16px;
      animation: fadeUp 0.7s 0.2s ease both;
    }

    .dev-info { display: flex; align-items: center; gap: 12px; }

    .dev-avatar {
      width: 36px; height: 36px; border-radius: 50%;
      border: 1px dashed rgba(255,255,255,0.18);
      background: #161616;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden; flex-shrink: 0;
    }
    .dev-avatar svg { width: 15px; height: 15px; opacity: 0.2; }

    .dev-text { display: flex; flex-direction: column; gap: 2px; }
    .dev-role {
      font-family: 'DM Mono', monospace;
      font-size: 9px; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--text-muted);
    }
    .dev-name { font-size: 13px; font-weight: 500; }

    .dev-links { display: flex; gap: 8px; }
    .dev-link {
      width: 32px; height: 32px;
      border: 1px solid var(--border); border-radius: 4px;
      display: flex; align-items: center; justify-content: center;
      color: var(--text-muted); text-decoration: none;
      transition: border-color 0.2s, color 0.2s;
    }
    .dev-link:hover { border-color: var(--accent); color: var(--accent); }
    .dev-link svg { width: 14px; height: 14px; fill: currentColor; }

    @keyframes fadeDown {
      from { opacity:0; transform:translateY(-12px); }
      to   { opacity:1; transform:translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity:0; transform:translateY(14px); }
      to   { opacity:1; transform:translateY(0); }
    }

    @media (max-width: 480px) {
      header { padding: 16px 0 14px; }
      main   { padding: 18px 0 18px; }
      footer { flex-direction: column; align-items: flex-start; padding-bottom: 28px; }
      .dev-links { align-self: flex-end; }
    }

    @supports (padding: env(safe-area-inset-bottom)) {
      .page { padding-bottom: env(safe-area-inset-bottom); }
    }
  </style>
</head>
<body>
<div class="page">

  <!-- ══ HEADER ══ -->
  <header>
    <div class="logo-zone">
      <!--
        YOUR LOGO:
        Replace the <div class="logo-slot"> with:
        <img src="logo.png" style="height:40px;width:auto;" alt="Logo">
      -->
      <div class="logo-slot">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5">
          <rect x="3" y="3" width="18" height="18" rx="3"/>
          <circle cx="8.5" cy="8.5" r="1.5"/>
          <polyline points="21 15 16 10 5 21"/>
        </svg>
      </div>
      <div class="brand">
        <!-- YOUR STARTUP NAME HERE -->
        <div class="brand-name">Your Startup</div>
        <div class="brand-sub">Mini Game</div>
      </div>
    </div>
    <div class="play-pill">Play Now</div>
  </header>

  <!-- ══ GAME ══ -->
  <main>
    <span class="section-label">Tap Tumble</span>

    <div class="game-frame">
      <!--
        ════════════════════════════════════════
        BRESHNA EMBED — exactly as provided
        ════════════════════════════════════════
      -->
      <div class="breshna-embed">
        <div style="width: 100%; text-align: center; background-color: #23183D;">
          <img src="https://breshna.io/_next/static/media/BreshnaLogo.9878047a.svg" alt="" style="padding: 10px;">
          <iframe style="border: none; display:block; margin-bottom:0px;" width="100%" height="600px" src="https://breshna.io/api/games/tapTumble/index.html?template_id=6a21aadfb0bc57d1d10adaf1" title="Tap Tumble"></iframe>
          <div style="background-color: #23183D; padding: 15px;">
            <h3 style="background-color: #23183D; margin: 0px; color: white; font-family: sans-serif;">This game was created on Breshna.io.</h3>
            <div style="background-color: #23183D; padding: 10px;">
              <h3 style="margin: 0px; color: white; font-family: sans-serif;">Click here to create yours</h3>
              <div style="margin-top: 20px;">
                <a href="https://breshna.io" style="padding: 9px 27px; border-radius: 8px; background-color: #7b3fd5; font-size: 1.5rem; font-weight: 600; margin-bottom: 20px; text-transform: capitalize; font-family: sans-serif; margin-top: 10px; text-decoration: none; color: #fff;">Create</a>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- ══ DEVELOPER ══ -->
  <footer>
    <div class="dev-info">
      <!--
        YOUR PHOTO:
        Replace <div class="dev-avatar"> with:
        <img src="photo.jpg" style="width:36px;height:36px;border-radius:50%;object-fit:cover;" alt="Dev">
      -->
      <div class="dev-avatar">
        <svg viewBox="0 0 24 24" fill="white">
          <path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/>
        </svg>
      </div>
      <div class="dev-text">
        <span class="dev-role">Developed by</span>
        <!-- YOUR NAME HERE -->
        <span class="dev-name">Developer Name</span>
      </div>
    </div>

    <div class="dev-links">
      <!-- YOUR GITHUB URL -->
      <a href="#" class="dev-link" title="GitHub" aria-label="GitHub">
        <svg viewBox="0 0 24 24"><path d="M12 .3C5.4.3 0 5.7 0 12.3c0 5.3 3.4 9.8 8.2 11.4.6.1.8-.3.8-.6v-2c-3.3.7-4-1.6-4-1.6-.5-1.4-1.3-1.8-1.3-1.8-1.1-.7.1-.7.1-.7 1.2.1 1.8 1.2 1.8 1.2 1.1 1.8 2.8 1.3 3.5 1 .1-.8.4-1.3.8-1.6-2.7-.3-5.5-1.3-5.5-5.9 0-1.3.5-2.4 1.2-3.2-.1-.3-.5-1.5.1-3.2 0 0 1-.3 3.3 1.2a11.5 11.5 0 0 1 6 0C17 4.5 18 4.8 18 4.8c.7 1.7.2 2.9.1 3.2.8.8 1.2 1.9 1.2 3.2 0 4.6-2.8 5.6-5.5 5.9.4.4.8 1.1.8 2.2v3.3c0 .3.2.7.8.6C20.6 22.1 24 17.6 24 12.3 24 5.7 18.6.3 12 .3z"/></svg>
      </a>
      <!-- YOUR PORTFOLIO URL -->
      <a href="#" class="dev-link" title="Portfolio" aria-label="Portfolio">
        <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>
      </a>
    </div>
  </footer>

</div>
</body>
</html>
